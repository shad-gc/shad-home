server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    error_page 403 404 405 /404.html;
    error_page 500 502 503 504 /404.html;

    location = /404.html {
        internal;
    }

    location ~* \.(?:css|svg|ico|png|jpg|jpeg|gif|webp|woff2?|ttf|eot|map|js|json|txt|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }
}
